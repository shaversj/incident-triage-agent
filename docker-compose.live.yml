services:
  agent:
    command: ["serve", "--host", "0.0.0.0", "--port", "8080"]
    environment:
      GRAFANA_WEBHOOK_SECRET: "${GRAFANA_WEBHOOK_SECRET:-local-webhook-secret}"
      LOKI_BASE_URL: "http://loki:3100"
      LOKI_LIMIT: "${LOKI_LIMIT:-10}"
      MINIMAX_API_KEY: "${MINIMAX_API_KEY}"
      MODEL_NAME: "${MODEL_NAME}"
      MINIMAX_BASE_URL: "${MINIMAX_BASE_URL:-https://api.minimax.io}"
