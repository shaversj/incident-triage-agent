services:
  loki:
    image: grafana/loki:3.5.1
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports:
      - "3100:3100"

  grafana:
    image: grafana/grafana-oss:12.0.1
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_SECURITY_ADMIN_PASSWORD: "admin"
    depends_on:
      - loki

  synthetic-checkout:
    build: .
    entrypoint: ["python", "-m", "services.synthetic_checkout_service"]
    ports:
      - "8081:8081"
    environment:
      HOST: "0.0.0.0"
      PORT: "8081"
      LOKI_URL: "http://loki:3100"
      SERVICE_NAME: "checkout-api"
    depends_on:
      - loki

  agent:
    build: .
    command: ["serve", "--host", "0.0.0.0", "--port", "8080", "--mock-llm"]
    ports:
      - "8080:8080"
    environment:
      GRAFANA_WEBHOOK_SECRET: "local-webhook-secret"
      LOKI_BASE_URL: "http://loki:3100"
      LOKI_LIMIT: "10"
    depends_on:
      - loki
      - grafana
      - synthetic-checkout
